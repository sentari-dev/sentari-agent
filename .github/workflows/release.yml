name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build enterprise agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags enterprise \
            -ldflags="-s -w -X main.version=$VERSION" \
            -o dist/sentari-agent-${GOOS}-${GOARCH}${EXT} \
            ./cmd/sentari-agent/

      - name: Build OSS agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
          VERSION="${GITHUB_REF_NAME#v}"
          go build \
            -ldflags="-s -w -X main.version=$VERSION" \
            -o dist/sentari-agent-oss-${GOOS}-${GOARCH}${EXT} \
            ./cmd/sentari-agent/

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/sentari-agent*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sentari-agent* > SHA256SUMS.txt

      - name: Attest binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/sentari-agent*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/sentari-agent*
            dist/SHA256SUMS.txt
