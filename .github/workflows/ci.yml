name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race

      - name: Build (OSS)
        run: CGO_ENABLED=0 go build ./cmd/sentari-agent/

      - name: Build (Enterprise)
        run: CGO_ENABLED=0 go build -tags enterprise ./cmd/sentari-agent/
